name: Feature request
description: Suggest an idea or improvement for env-kit-webui
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem are you trying to solve? What is the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution or behavior you would like to see.
    validations:
      required: true
