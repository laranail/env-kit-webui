name: Bug report
description: Report a problem with env-kit-webui
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        **Do not paste real secrets** (API keys, passwords, tokens, full `.env`
        contents). Redact any sensitive values before submitting.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Versions
      description: Package, PHP, and Laravel versions.
      placeholder: "env-kit-webui 1.0.0, PHP 8.4, Laravel 13.0"
    validations:
      required: true

  - type: textarea
    id: web-surface
    attributes:
      label: Web surface configuration
      description: >
        Which theme is in use, whether the web surface is enabled, and how
        authentication / access is set up for it.
      placeholder: |
        Theme: default
        Surface enabled: yes
        Auth: gated behind an admin middleware / can:manage-env gate
    validations:
      required: true
