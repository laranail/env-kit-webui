name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      # env-kit-headless is not on Packagist yet; resolve it from its public repo
      # (no-api = git clone, avoids GitHub REST API rate limits). Other laranail
      # deps (package-tools) resolve from Packagist.
      - name: Resolve unpublished laranail packages from VCS
        run: composer config repositories.env-kit-headless '{"type":"vcs","url":"https://github.com/laranail/env-kit-headless","no-api":true}'
      - name: Install dependencies
        run: composer update --prefer-stable --no-interaction --no-progress

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Pest (tests)
        run: vendor/bin/pest
