name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      # The dependency `laranail/env-kit-headless` resolves from Packagist in CI.
      # The local `path` repository in composer.json (../headless) is dev-only and
      # does not exist in CI, so this build must not assume a sibling checkout.
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Pest (tests)
        run: vendor/bin/pest
